services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: cwg
      DB_USER: cwg
      DB_PASS: cwg
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: cwg
      MARIADB_USER: cwg
      MARIADB_PASSWORD: cwg
    volumes:
      - ../dump-cwg-202604271337.sql:/docker-entrypoint-initdb.d/01-dump.sql:ro
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db-data:
